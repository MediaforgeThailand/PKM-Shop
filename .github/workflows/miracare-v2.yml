name: MiraCare v2 verification

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/miracare-v2.yml'
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'scripts/**'
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
  pull_request:
    paths:
      - '.github/workflows/miracare-v2.yml'
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'scripts/**'
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 24

      - name: Install Node dependencies
        run: npm ci

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: TypeScript check
        run: npm run typecheck

      - name: Type safety audit
        run: npm run v2:type-safety-audit

      - name: Chat quality checks
        run: npm run chat:quality

      - name: Order status write audit
        run: npm run orders:status-audit

      - name: Schema contract audit
        run: npm run v2:schema-audit

      - name: Open question audit
        run: npm run v2:open-questions-audit

      - name: Local readiness audit
        run: npm run v2:local-readiness-audit

      - name: Documentation evidence audit
        run: npm run v2:docs-audit

      - name: Client v2 route audit
        run: npm run v2:client-audit

      - name: Edge security audit
        run: npm run v2:edge-security-audit

      - name: Health safety audit
        run: npm run v2:health-safety-audit

      - name: Type mirror audit
        run: npm run types:mirror-audit

      - name: Template mirror audit
        run: npm run templates:mirror-audit

      - name: V2 deploy script audit
        run: npm run v2:deploy-audit

      - name: Deno edge entrypoint check
        run: npm run v2:deno-check

      - name: Deno shared unit tests
        run: npm run v2:deno-test

  live-regression:
    runs-on: ubuntu-latest
    needs: verify
    env:
      MIRA_DEMO_PROMPTPAY_ID: ${{ secrets.MIRA_DEMO_PROMPTPAY_ID }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
    steps:
      - name: Check live regression credentials
        id: gate
        shell: bash
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON_KEY" ] && [ -n "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Live regression skipped: missing one or more Supabase secrets."
          fi
          if [ -n "$MIRA_DEMO_PROMPTPAY_ID" ]; then
            echo "commerce_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "commerce_ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: ${{ steps.gate.outputs.ready == 'true' }}
        uses: actions/checkout@v4

      - name: Set up Node
        if: ${{ steps.gate.outputs.ready == 'true' }}
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 24

      - name: Install Node dependencies
        if: ${{ steps.gate.outputs.ready == 'true' }}
        run: npm ci

      - name: Seed demo tenant
        if: ${{ steps.gate.outputs.ready == 'true' }}
        run: node scripts/seed-demo.mjs

      - name: Live RLS check
        if: ${{ steps.gate.outputs.ready == 'true' }}
        run: npm run v2:rls-check

      - name: Chat regression suite
        if: ${{ steps.gate.outputs.ready == 'true' }}
        run: npm run chat:regression

      - name: Commerce E2E suite
        if: ${{ steps.gate.outputs.ready == 'true' && steps.gate.outputs.commerce_ready == 'true' }}
        run: npm run v2:e2e-commerce

      - name: Commerce E2E skipped
        if: ${{ steps.gate.outputs.ready == 'true' && steps.gate.outputs.commerce_ready != 'true' }}
        run: echo "Commerce E2E skipped: set MIRA_DEMO_PROMPTPAY_ID to seed the demo tenant PromptPay id."
