name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck-and-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: TypeScript typecheck
        run: npm run typecheck
      - name: Chat quality static checks
        run: npm run chat:quality
      - name: Order status write audit
        run: npm run orders:status-audit
      - name: Client v2 route audit
        run: npm run v2:client-audit
      - name: Edge security audit
        run: npm run v2:edge-security-audit
      - name: Health safety audit
        run: npm run v2:health-safety-audit
      - name: Type mirror audit
        run: npm run types:mirror-audit

  edge-function-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run shared module unit tests
        run: npm run v2:deno-test
