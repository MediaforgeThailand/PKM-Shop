<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <style>
      @font-face { font-family: 'Anuphan'; src: url('../fonts/anuphan-thai-400-normal.woff2') format('woff2'); font-weight: 400; font-display: block; }
      @font-face { font-family: 'Anuphan'; src: url('../fonts/anuphan-thai-500-normal.woff2') format('woff2'); font-weight: 500; font-display: block; }
      @font-face { font-family: 'Anuphan'; src: url('../fonts/anuphan-thai-600-normal.woff2') format('woff2'); font-weight: 600; font-display: block; }
      @font-face { font-family: 'Space Grotesk'; src: url('../fonts/space-grotesk-latin-600-normal.woff2') format('woff2'); font-weight: 600; font-display: block; }

      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #faeef1; }

      #root {
        --rose: #e58fa2; --rose-deep: #c14d6a; --rose-soft: #fbe7ec; --brand: #2e6bf6; --deep: #1d56db;
        --ink: #2a2230; --ink-soft: #6a5a64; --muted: #9a8a92; --surface: #ffffff; --line: #efdfe4; --mint: #1faa78;
        position: relative; width: 1920px; height: 1080px; overflow: hidden; color: #2a2230;
        font-family: 'Anuphan', system-ui, sans-serif;
        background:
          radial-gradient(48% 44% at 84% 14%, rgba(229, 143, 162, 0.26), transparent 60%),
          radial-gradient(40% 40% at 12% 88%, rgba(63, 142, 252, 0.12), transparent 60%),
          linear-gradient(160deg, #fdf3f6 0%, #f6e6ec 100%);
      }
      .tag { position: absolute; right: 80px; top: 70px; display: inline-flex; align-items: center; gap: 14px; padding: 14px 26px; border-radius: 999px;
        background: rgba(255,255,255,0.82); border: 1px solid rgba(255,255,255,0.9); -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
        font-size: 30px; font-weight: 600; color: var(--rose-deep); box-shadow: 0 14px 30px -16px rgba(193,77,106,0.4); }
      .tag .dot { width: 14px; height: 14px; border-radius: 50%; background: var(--rose); box-shadow: 0 0 0 6px rgba(229,143,162,0.18); }

      /* face scan panel (left) */
      .scan { position: absolute; left: 80px; top: 200px; width: 760px; height: 600px; border-radius: 34px; overflow: hidden;
        background: rgba(255,255,255,0.6); -webkit-backdrop-filter: blur(24px); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.85);
        box-shadow: 0 40px 100px -42px rgba(193,77,106,0.4), inset 0 1px 0 rgba(255,255,255,0.9); }
      .scan svg { width: 100%; height: 100%; }
      .face path { fill: none; stroke: #4a3a44; stroke-width: 3.4; stroke-linecap: round; }
      .grid path { stroke: rgba(229,143,162,0.3); stroke-width: 1.4; }
      .dot { fill: var(--rose); opacity: 0; }
      .beam { fill: url(#beam-grad); opacity: 0; }
      .scan-cap { position: absolute; left: 36px; bottom: 30px; font-size: 24px; font-weight: 600; color: var(--rose-deep); }

      /* results (right) */
      .panel { position: absolute; right: 80px; top: 220px; width: 860px; display: flex; flex-direction: column; gap: 24px; }
      .who { display: inline-flex; align-items: center; gap: 12px; font-size: 24px; font-weight: 600; color: var(--rose-deep); }
      .who .av { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--rose-deep), var(--rose)); }
      .res { display: inline-flex; align-items: center; gap: 16px; padding: 22px 28px; border-radius: 22px; font-size: 27px; font-weight: 600; opacity: 0;
        background: #fff; border: 1px solid var(--line); box-shadow: 0 18px 40px -22px rgba(42,34,48,0.35); }
      .res .i { width: 16px; height: 16px; border-radius: 50%; background: var(--rose); flex: none; }
      .res.rec { background: var(--rose-soft); border-color: rgba(229,143,162,0.5); color: var(--rose-deep); }
      .res.cta { background: linear-gradient(120deg, var(--rose-deep), var(--rose)); color: #fff; border: 0; }
      .res .price { font-family: 'Space Grotesk', sans-serif; font-weight: 600; margin-left: auto; }

      .keyline { position: absolute; left: 50%; bottom: 60px; transform: translateX(-50%); text-align: center; width: 1560px; opacity: 0; }
      .keyline .k { font-size: 40px; font-weight: 600; letter-spacing: -0.5px; line-height: 1.3; }
      .keyline .k b { color: var(--rose-deep); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="mirabeauty" data-width="1920" data-height="1080" data-start="0" data-duration="16">
      <div class="tag"><span class="dot"></span>MiraBeauty · สำหรับคลินิกความงาม</div>

      <div class="scan">
        <svg viewBox="0 0 760 600" aria-hidden="true">
          <defs>
            <linearGradient id="beam-grad" x1="0" y1="0" x2="0" y2="1">
              <stop stop-color="rgba(229,143,162,0)"/><stop offset="0.5" stop-color="rgba(229,143,162,0.5)"/><stop offset="1" stop-color="rgba(229,143,162,0)"/>
            </linearGradient>
          </defs>
          <g class="grid"><path d="M210 150 H560"/><path d="M210 250 H560"/><path d="M210 350 H560"/><path d="M210 450 H560"/></g>
          <g class="face">
            <path d="M360 80 C 300 88 262 130 262 184 C 262 220 280 242 274 266 C 270 284 252 294 256 308 C 259 318 274 320 276 330 C 278 340 268 346 272 358 C 277 372 296 374 318 376 C 342 378 354 388 354 408 C 354 446 322 472 274 484"/>
            <path d="M360 80 C 430 70 506 100 536 170" opacity="0.5"/>
            <path d="M312 214 C 324 206 342 206 352 214" />
          </g>
          <circle class="dot" id="dot1" cx="300" cy="200" r="8"/>
          <circle class="dot" id="dot2" cx="276" cy="320" r="8"/>
          <circle class="dot" id="dot3" cx="330" cy="410" r="8"/>
          <rect class="beam" id="beam" x="200" y="60" width="420" height="90"/>
        </svg>
        <div class="scan-cap">สแกนใบหน้า · วิเคราะห์ผิวและโครงหน้า</div>
      </div>

      <div class="panel">
        <span class="who"><span class="av"></span>Mira · MiraBeauty</span>
        <div class="res" id="r1"><span class="i"></span>ผลสแกน: ผิวขาดน้ำโซนแก้ม <span style="color:var(--muted);font-weight:500;">(ตัวอย่าง)</span></div>
        <div class="res rec" id="r2">แนะนำ: คอร์สฟื้นฟูผิว 4 ครั้ง <span class="price">฿12,000</span></div>
        <div class="res cta" id="r3">ปรึกษาและจองคอร์สต่อในแชท →</div>
      </div>

      <div class="keyline" id="keyline">
        <div class="k">ตอนเห็นผลสแกนหน้าตัวเอง คือตอนที่<b>อยากซื้อที่สุด</b> — Mira เสนอคอร์สตรงจังหวะนั้น</div>
      </div>

      <script src="../vendor/gsap.min.js"></script>
      <script>
        const tl = gsap.timeline({ paused: true, defaults: { ease: 'power2.out' } });

        tl.from('.tag', { y: -18, opacity: 0, duration: 0.6 }, 0.1)
          .from('.scan', { x: -40, opacity: 0, duration: 0.7, ease: 'power3.out' }, 0.4)
          .from('.panel .who', { x: 40, opacity: 0, duration: 0.6 }, 0.6);

        /* scan beam sweeps down twice, landmark dots light up */
        tl.set('#beam', { opacity: 1 }, 1.0)
          .fromTo('#beam', { y: 0 }, { y: 480, duration: 1.6, ease: 'sine.inOut' }, 1.0)
          .to('#beam', { y: 0, duration: 1.4, ease: 'sine.inOut' }, 2.7);
        tl.to('#dot1', { opacity: 1, r: 11, duration: 0.3, yoyo: true, repeat: 1 }, 1.5)
          .to('#dot2', { opacity: 1, r: 11, duration: 0.3, yoyo: true, repeat: 1 }, 1.9)
          .to('#dot3', { opacity: 1, r: 11, duration: 0.3, yoyo: true, repeat: 1 }, 2.3)
          .set(['#dot1', '#dot2', '#dot3'], { opacity: 0.85, r: 8 }, 2.7);

        /* results appear — slow, readable */
        tl.fromTo('#r1', { y: 22, opacity: 0 }, { y: 0, opacity: 1, duration: 0.6, ease: 'back.out(1.3)' }, 4.6)
          .fromTo('#r2', { y: 22, opacity: 0 }, { y: 0, opacity: 1, duration: 0.6, ease: 'back.out(1.4)' }, 6.4)
          .fromTo('#r3', { y: 18, scale: 0.94, opacity: 0 }, { y: 0, scale: 1, opacity: 1, duration: 0.6, ease: 'back.out(1.5)' }, 8.2);

        tl.fromTo('#keyline', { y: 22, opacity: 0 }, { y: 0, opacity: 1, duration: 0.7 }, 10.2);

        tl.to(['.tag', '.scan', '.panel', '#keyline'], { opacity: 0, duration: 0.6 }, 15.1);

        window.__timelines = window.__timelines || {};
        window.__timelines['mirabeauty'] = tl;
      </script>
    </div>
  </body>
</html>
