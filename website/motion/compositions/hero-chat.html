<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <style>
      @font-face { font-family: 'Anuphan'; src: url('../fonts/anuphan-thai-400-normal.woff2') format('woff2'); font-weight: 400; font-display: block; }
      @font-face { font-family: 'Anuphan'; src: url('../fonts/anuphan-thai-500-normal.woff2') format('woff2'); font-weight: 500; font-display: block; }
      @font-face { font-family: 'Anuphan'; src: url('../fonts/anuphan-thai-600-normal.woff2') format('woff2'); font-weight: 600; font-display: block; }
      @font-face { font-family: 'Space Grotesk'; src: url('../fonts/space-grotesk-latin-600-normal.woff2') format('woff2'); font-weight: 600; font-display: block; }

      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #051226; }

      #root {
        --deep: #1d56db; --brand: #2e6bf6; --bright: #3f8efc; --ink: #101a33; --ink-soft: #4a5878;
        --surface: #ffffff; --line: #e6edfb; --soft: #e9f0ff; --mint: #1faa78;
        position: relative; width: 880px; height: 1200px; overflow: hidden;
        font-family: 'Anuphan', system-ui, sans-serif;
        /* opaque background tuned to the hero's vertical gradient so the video's
           left/right edges blend in (the CSS mask in Hero.astro fades top/bottom) */
        background:
          radial-gradient(135% 78% at 50% 38%, rgba(46, 107, 246, 0.10), transparent 72%),
          linear-gradient(180deg, #051226 0%, #06182f 56%, #082040 100%);
      }

      .stream { position: absolute; left: 40px; right: 40px; top: 0; display: flex; flex-direction: column; gap: 22px; }
      .msg { display: flex; }
      .msg[data-side="right"] { justify-content: flex-end; }
      .msg[data-side="center"] { justify-content: center; }

      .bubble { max-width: 80%; padding: 22px 26px; font-size: 31px; line-height: 1.34; border-radius: 28px; }
      .bubble.user { color: #fff; background: linear-gradient(120deg, var(--deep), var(--bright)); border-bottom-right-radius: 9px;
        box-shadow: 0 22px 50px -18px rgba(29, 86, 219, 0.7); }
      .bubble.mira { color: var(--ink); background: var(--surface); border-bottom-left-radius: 9px; box-shadow: 0 26px 60px -22px rgba(2, 10, 28, 0.7); }

      .chip { padding: 14px 24px; border-radius: 999px; font-size: 25px; font-weight: 500; color: #cfe0ff;
        background: rgba(214, 230, 255, 0.12); border: 1px solid rgba(214, 230, 255, 0.22); }

      .products { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; width: 100%; }
      .pcard { padding: 22px; border-radius: 24px; background: var(--surface); box-shadow: 0 26px 60px -24px rgba(2, 10, 28, 0.7); }
      .pname { font-size: 25px; font-weight: 600; line-height: 1.25; color: var(--ink); }
      .pprice { margin-top: 12px; font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 30px; color: var(--deep); }
      .badge { display: inline-block; margin-top: 12px; padding: 4px 14px; border-radius: 999px; font-size: 18px; font-weight: 600; background: var(--soft); color: var(--deep); }

      .order { padding: 24px; border-radius: 26px; background: var(--surface); box-shadow: 0 26px 60px -24px rgba(2, 10, 28, 0.7);
        display: grid; grid-template-columns: 1fr 150px; gap: 22px; align-items: center; max-width: 92%; }
      .otitle { font-size: 27px; font-weight: 600; color: var(--ink); }
      .oline { margin-top: 10px; font-size: 21px; color: var(--ink-soft); }
      .oamt { margin-top: 12px; font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 32px; color: var(--deep); }
      .qr { width: 150px; height: 150px; border-radius: 20px; padding: 14px; background: #f4f7fe; }
      .qr svg { width: 100%; height: 100%; }

      .status { width: 100%; display: flex; align-items: center; justify-content: center; gap: 14px; padding: 20px; border-radius: 20px;
        background: rgba(31, 170, 120, 0.18); border: 1px solid rgba(31, 170, 120, 0.5); color: #5fe0aa; font-size: 27px; font-weight: 600; }
      .check { width: 36px; height: 36px; border-radius: 50%; background: var(--mint); color: #fff; display: grid; place-items: center; font-size: 22px; }
      .toast { width: 100%; padding: 20px 24px; border-radius: 20px; font-size: 25px; font-weight: 600; color: #d7ecff;
        background: linear-gradient(110deg, rgba(46, 107, 246, 0.22), rgba(31, 170, 120, 0.24)); border: 1px solid rgba(31, 170, 120, 0.42); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="hero-chat" data-width="880" data-height="1200" data-start="0" data-duration="13">
      <div class="stream" id="stream">
        <div class="msg" data-side="center" id="m1"><div class="chip">มาจากลิงก์แนะนำ · คุณหมอนก</div></div>
        <div class="msg" data-side="right" id="m2"><div class="bubble user">ตรวจสุขภาพให้คุณแม่ อายุ 58</div></div>
        <div class="msg" data-side="left" id="m3"><div class="bubble mira">แนะนำ 2 โปรแกรมที่เหมาะค่ะ</div></div>
        <div class="msg" data-side="left" id="m4">
          <div class="products">
            <div class="pcard"><div class="pname">ตรวจสุขภาพ Premium 50+</div><div class="pprice">฿4,900</div><span class="badge">ตัวอย่าง</span></div>
            <div class="pcard"><div class="pname">ตรวจหัวใจครบวงจร</div><div class="pprice">฿6,500</div><span class="badge">ตัวอย่าง</span></div>
          </div>
        </div>
        <div class="msg" data-side="right" id="m5"><div class="bubble user">เอา Premium 50+ ค่ะ</div></div>
        <div class="msg" data-side="left" id="m6">
          <div class="order">
            <div>
              <div class="otitle">ตรวจสุขภาพ Premium 50+</div>
              <div class="oline">ลาดพร้าว · พรุ่งนี้ 09:30</div>
              <div class="oamt">฿4,900</div>
            </div>
            <div class="qr">
              <svg viewBox="0 0 100 100" aria-hidden="true">
                <rect width="100" height="100" fill="#fff"/>
                <g fill="#101a33">
                  <rect x="6" y="6" width="26" height="26"/><rect x="12" y="12" width="14" height="14" fill="#fff"/><rect x="16" y="16" width="6" height="6" fill="#101a33"/>
                  <rect x="68" y="6" width="26" height="26"/><rect x="74" y="12" width="14" height="14" fill="#fff"/><rect x="78" y="16" width="6" height="6" fill="#101a33"/>
                  <rect x="6" y="68" width="26" height="26"/><rect x="12" y="74" width="14" height="14" fill="#fff"/><rect x="16" y="78" width="6" height="6" fill="#101a33"/>
                  <rect x="40" y="6" width="6" height="6"/><rect x="52" y="10" width="6" height="6"/><rect x="42" y="20" width="6" height="6"/><rect x="56" y="22" width="6" height="6"/>
                  <rect x="40" y="40" width="6" height="6"/><rect x="50" y="44" width="6" height="6"/><rect x="62" y="42" width="6" height="6"/><rect x="74" y="46" width="6" height="6"/><rect x="86" y="42" width="6" height="6"/>
                  <rect x="42" y="56" width="6" height="6"/><rect x="54" y="58" width="6" height="6"/><rect x="68" y="60" width="6" height="6"/><rect x="84" y="58" width="6" height="6"/>
                  <rect x="44" y="74" width="6" height="6"/><rect x="58" y="78" width="6" height="6"/><rect x="70" y="74" width="6" height="6"/><rect x="84" y="80" width="6" height="6"/><rect x="44" y="88" width="6" height="6"/><rect x="64" y="88" width="6" height="6"/>
                </g>
              </svg>
            </div>
          </div>
        </div>
        <div class="msg" data-side="center" id="m7"><div class="status"><span class="check">✓</span>ชำระเงินแล้ว · ยืนยันนัดหมาย</div></div>
        <div class="msg" data-side="center" id="m8"><div class="toast">ส่วนแบ่งผู้แนะนำ +฿350 → คุณหมอนก</div></div>
      </div>

      <script src="../vendor/gsap.min.js"></script>
      <script>
        const tl = gsap.timeline({ paused: true, defaults: { ease: 'power3.out' } });
        const ids = ['#m1', '#m2', '#m3', '#m4', '#m5', '#m6', '#m7', '#m8'];
        const rows = ids.map((id) => document.querySelector(id));

        // live-chat scroll: newest bubble always lands in the lower zone, older ones drift up
        const GAP = 22, H = 1200, PAD_BOTTOM = 80;
        const bottoms = [];
        let cum = 0;
        rows.forEach((r) => { cum += r.offsetHeight; bottoms.push(cum); cum += GAP; });
        const yAt = (i) => H - PAD_BOTTOM - bottoms[i];
        gsap.set('#stream', { y: yAt(0) });

        // each bubble bounces up from its own side (right = customer, left = Mira)
        const enter = [0.4, 1.5, 2.7, 3.9, 5.3, 6.6, 8.0, 9.0];
        ids.forEach((id, i) => {
          const side = rows[i].dataset.side;
          const fromX = side === 'right' ? 40 : side === 'left' ? -40 : 0;
          if (i > 0) {
            tl.to('#stream', { y: yAt(i), duration: 0.6, ease: 'power3.out' }, enter[i] - 0.12);
          }
          tl.from(id, { y: 60, x: fromX, opacity: 0, scale: 0.86, duration: 0.5, ease: 'back.out(2)' }, enter[i]);
        });

        // brief settle, then dissolve upward for a clean loop seam
        tl.to('.msg', { y: -40, opacity: 0, duration: 0.7, stagger: 0.04, ease: 'power2.in' }, 11.3);

        window.__timelines = window.__timelines || {};
        window.__timelines['hero-chat'] = tl;
      </script>
    </div>
  </body>
</html>
