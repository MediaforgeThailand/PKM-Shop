<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #051226;
      }

      #root {
        position: relative;
        display: grid;
        width: 1080px;
        height: 1080px;
        place-items: center;
        overflow: hidden;
        background: #051226;
      }

      .ring {
        position: absolute;
        width: 640px;
        height: 640px;
        border: 2px solid rgba(244, 249, 250, 0.16);
        border-radius: 50%;
        box-shadow: inset 0 0 70px rgba(46, 107, 246, 0.08), 0 0 120px rgba(46, 107, 246, 0.08);
      }

      .comet {
        position: absolute;
        width: 640px;
        height: 640px;
        animation: orbit 10s linear infinite;
      }

      .comet::before {
        position: absolute;
        top: -9px;
        left: calc(50% - 9px);
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #9CC3FE;
        box-shadow: 0 0 30px rgba(157, 188, 254, 0.9), 0 0 80px rgba(46, 107, 246, 0.5);
        content: "";
      }

      .node {
        position: absolute;
        display: grid;
        width: 112px;
        height: 112px;
        place-items: center;
        border: 1px solid rgba(244, 249, 250, 0.16);
        border-radius: 34px;
        background: rgba(255, 255, 255, 0.06);
        animation: pulse 10s ease-in-out infinite;
      }

      .node svg {
        width: 46px;
        height: 46px;
        stroke: #9CC3FE;
      }

      .node.one {
        top: 164px;
        left: 484px;
      }

      .node.two {
        top: 484px;
        right: 164px;
        animation-delay: 2.5s;
      }

      .node.three {
        bottom: 164px;
        left: 484px;
        animation-delay: 5s;
      }

      .node.four {
        top: 484px;
        left: 164px;
        animation-delay: 7.5s;
      }

      .monogram {
        display: grid;
        width: 210px;
        height: 210px;
        place-items: center;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(157, 188, 254, 0.16), rgba(255, 255, 255, 0.04));
        color: #f4f9fa;
        font: 600 92px/1 system-ui, sans-serif;
        animation: breathe 10s ease-in-out infinite;
      }

      @keyframes orbit {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {
        0%,
        18%,
        100% {
          box-shadow: 0 0 0 rgba(157, 188, 254, 0);
          transform: scale(1);
        }

        6% {
          box-shadow: 0 0 54px rgba(157, 188, 254, 0.42);
          transform: scale(1.07);
        }
      }

      @keyframes breathe {
        0%,
        100% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.05);
        }
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="referral-flywheel" data-width="1080" data-height="1080" data-start="0" data-duration="10">
      <span class="ring"></span>
      <span class="comet"></span>
      <span class="monogram">M</span>
      <span class="node one">
        <svg viewBox="0 0 48 48" fill="none" stroke-width="3"><path d="M18 30 30 18"/><path d="M20 14h14v14"/><path d="M14 34h20"/></svg>
      </span>
      <span class="node two">
        <svg viewBox="0 0 48 48" fill="none" stroke-width="3"><path d="M10 16a8 8 0 0 1 8-8h12a8 8 0 0 1 8 8v8a8 8 0 0 1-8 8h-7l-9 8v-8h-4z"/></svg>
      </span>
      <span class="node three">
        <svg viewBox="0 0 48 48" fill="none" stroke-width="3"><path d="M12 12h10v10H12zM26 12h10v10H26zM12 26h10v10H12zM28 28h8v8h-8z"/></svg>
      </span>
      <span class="node four">
        <svg viewBox="0 0 48 48" fill="none" stroke-width="3"><path d="M16 34 32 14"/><circle cx="16" cy="16" r="4"/><circle cx="32" cy="32" r="4"/></svg>
      </span>
      <script src="../vendor/gsap.min.js"></script>
      <script>
        const tl = gsap.timeline({ paused: true });
        tl.to({}, { duration: 10 }, 0);
        window.__timelines = window.__timelines || {};
        window.__timelines["referral-flywheel"] = tl;
      </script>
    </div>
  </body>
</html>
