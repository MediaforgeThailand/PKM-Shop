<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #051226;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background:
          linear-gradient(rgba(214, 226, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(214, 226, 255, 0.035) 1px, transparent 1px),
          #051226;
        background-size: 64px 64px;
      }

      .blob {
        position: absolute;
        width: 660px;
        height: 660px;
        border-radius: 50%;
        filter: blur(70px);
        opacity: 0.74;
        mix-blend-mode: screen;
        animation: drift 12s ease-in-out infinite;
      }

      .blob.teal {
        top: 120px;
        left: 160px;
        background: rgba(46, 107, 246, 0.22);
      }

      .blob.mint {
        top: 210px;
        right: 260px;
        width: 560px;
        height: 560px;
        background: rgba(127, 177, 254, 0.16);
        animation-name: driftAlt;
      }

      .blob.blue {
        bottom: -110px;
        left: 660px;
        width: 700px;
        height: 700px;
        background: rgba(23, 86, 219, 0.16);
        animation-name: driftBlue;
      }

      .particle {
        position: absolute;
        width: 2px;
        height: 2px;
        border-radius: 50%;
        background: rgba(214, 226, 255, 0.54);
        animation: float 12s linear infinite;
      }

      @keyframes drift {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }

        50% {
          transform: translate(160px, 80px) scale(1.08);
        }
      }

      @keyframes driftAlt {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }

        50% {
          transform: translate(-130px, 90px) scale(1.12);
        }
      }

      @keyframes driftBlue {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }

        50% {
          transform: translate(40px, -120px) scale(1.06);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.22;
        }

        50% {
          transform: translateY(-28px);
          opacity: 0.8;
        }
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="hero-aurora" data-width="1920" data-height="1080" data-start="0" data-duration="12">
      <span class="blob teal"></span>
      <span class="blob mint"></span>
      <span class="blob blue"></span>
      <script>
        const root = document.querySelector('#root');
        const coords = [
          [130, 180], [260, 820], [410, 360], [520, 920], [680, 220],
          [780, 760], [910, 130], [1060, 560], [1190, 900], [1320, 270],
          [1460, 710], [1580, 180], [1740, 520], [1860, 860], [90, 540],
          [350, 620], [610, 470], [850, 1010], [1100, 330], [1230, 760],
          [1400, 500], [1660, 340], [1810, 110], [150, 980], [460, 120],
          [720, 620], [990, 820], [1160, 70], [1360, 970], [1530, 620],
          [1700, 760], [1840, 420], [220, 300], [560, 60], [820, 420],
          [1020, 980], [1280, 140], [1500, 880], [1760, 250], [70, 760],
          [310, 1040], [640, 860], [940, 260], [1210, 470], [1430, 90],
          [1600, 1010], [1880, 680], [500, 720], [760, 40], [1120, 700]
        ];
        coords.forEach(([left, top], index) => {
          const particle = document.createElement('span');
          particle.className = 'particle';
          particle.style.left = `${left}px`;
          particle.style.top = `${top}px`;
          particle.style.animationDelay = `${(index % 12) * -1}s`;
          particle.style.opacity = String(0.18 + (index % 5) * 0.08);
          root.append(particle);
        });
      </script>
      <script src="../vendor/gsap.min.js"></script>
      <script>
        const tl = gsap.timeline({ paused: true });
        tl.to({}, { duration: 12 }, 0);
        window.__timelines = window.__timelines || {};
        window.__timelines["hero-aurora"] = tl;
      </script>
    </div>
  </body>
</html>
